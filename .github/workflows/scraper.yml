name: Collect Australian Land

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # daily run

jobs:
  run-all:
    runs-on: ubuntu-latest

    timeout-minutes: 330  # stops before 6h

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: land-data
          path: land_victoria.csv
